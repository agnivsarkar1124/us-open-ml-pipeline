<script>
    const API_URL = "https://two026-us-open-ml-predictor.onrender.com";

    async function loadPlayers() {
        try {
            const res = await fetch(`${API_URL}/players`);
            const data = await res.json();
            const pA = document.getElementById("playerA");
            const pB = document.getElementById("playerB");

            pA.innerHTML = "";
            pB.innerHTML = "";

            data.players.forEach((player, idx) => {
                pA.add(new Option(player, player, false, idx === 0));
                pB.add(new Option(player, player, false, idx === 1));
            });
        } catch (err) {
            console.error("Failed to load player list:", err);
        }
    }

    async function predictMatchup() {
        const pA_name = document.getElementById("playerA").value;
        const pB_name = document.getElementById("playerB").value;

        if (pA_name === pB_name) {
            alert("Please select two different players!");
            return;
        }

        document.getElementById("loader").style.display = "block";
        document.getElementById("resultContainer").style.display = "none";

        try {
            const res = await fetch(`${API_URL}/predict`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pA_name, pB_name })
            });

            const data = await res.json();

            document.getElementById("winnerName").innerText = `🏆 Predicted Winner: ${data.winner}`;
            document.getElementById("winConfidenceBadge").innerText = `${data.confidence}% Win Probability`;

            let probA = data.winner === pA_name ? data.confidence : (100 - data.confidence).toFixed(1);
            let probB = (100 - probA).toFixed(1);

            document.getElementById("labelPlayerA").innerText = `${pA_name} (${probA}%)`;
            document.getElementById("labelPlayerB").innerText = `${pB_name} (${probB}%)`;
            document.getElementById("barFillA").style.width = `${probA}%`;
            document.getElementById("barFillB").style.width = `${probB}%`;

            // Populate Detailed Breakdown Metrics
            const breakdown = data.matchup_breakdown;
            document.getElementById("h2hVal").innerText = `${breakdown.pA_h2h_wins} - ${breakdown.pB_h2h_wins}`;
            document.getElementById("eloDiffVal").innerText = `${data.h2h_diff > 0 ? '+' : ''}${data.h2h_diff} net H2H edge`;

            // Render Deciding Factors
            const factorsList = document.getElementById("decidingFactorsList");
            if (factorsList) {
                factorsList.innerHTML = breakdown.deciding_factors
                    .map(factor => `<li>${factor}</li>`)
                    .join("");
            }

            document.getElementById("loader").style.display = "none";
            document.getElementById("resultContainer").style.display = "block";

        } catch (err) {
            document.getElementById("loader").innerText = "❌ Error connecting to server. Please try again.";
        }
    }

    window.onload = loadPlayers;
</script>
