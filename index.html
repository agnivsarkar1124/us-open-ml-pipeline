<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 US Open AI Predictor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        button {
            background: #22c55e;
            color: #000;
            font-weight: bold;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
        }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #334155;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🎾 US Open AI Predictor</h2>
    <p style="color: #94a3b8;">FastAPI + Gradient Boosting Architecture</p>

    <button onclick="runPrediction()">Simulate Final Matchup</button>

    <div id="resultBox" class="result">
        <h3 id="winnerText" style="color: #4ade80; margin: 0;"></h3>
        <p id="confText" style="margin: 0.5rem 0 0 0;"></p>
    </div>
</div>

<script>
    const API_URL = "https://two026-us-open-ml-predictor.onrender.com/predict"; // Replace with your Render URL

    async function runPrediction() {
        const resultBox = document.getElementById("resultBox");
        resultBox.style.display = "block";
        resultBox.innerHTML = "Calculating probabilities...";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    pA_name: "Jannik Sinner",
                    pB_name: "Carlos Alcaraz",
                    elo_diff: 42.5,
                    h2h_diff: 1.0
                })
            });

            const data = await response.json();
            resultBox.innerHTML = `
                <h3 style="color: #4ade80; margin: 0;">🏆 ${data.winner}</h3>
                <p style="margin: 0.5rem 0 0 0;">Win Probability: ${data.confidence}%</p>
            `;
        } catch (err) {
            resultBox.innerHTML = "<p style='color: #ef4444;'>API Offline or Connecting...</p>";
        }
    }
</script>

</body>
</html>
